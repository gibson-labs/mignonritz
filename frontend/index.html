<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mignon Ritz — Coming Soon</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0d0d0d;
      color: #f0ece4;
      font-family: Georgia, 'Times New Roman', serif;
    }

    .container {
      text-align: center;
      padding: 2rem;
    }

    .eyebrow {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 0.7rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #a89070;
      margin-bottom: 1.5rem;
    }

    h1 {
      font-size: clamp(2.5rem, 8vw, 5rem);
      font-weight: 400;
      letter-spacing: 0.05em;
      line-height: 1.1;
      margin-bottom: 1.5rem;
      color: #f0ece4;
    }

    h1 em {
      font-style: italic;
      color: #c8b08a;
    }

    .divider {
      width: 40px;
      height: 1px;
      background: #a89070;
      margin: 1.5rem auto;
    }

    p {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 0.95rem;
      color: #a89070;
      letter-spacing: 0.02em;
      line-height: 1.7;
    }
  </style>
</head>
<body>
  <div class="container">
    <p class="eyebrow">Something Beautiful Is Coming</p>
    <h1>Mignon <em>Ritz</em></h1>
    <div class="divider"></div>
    <p>Website under construction.</p>
  </div>
</body>
</html>
