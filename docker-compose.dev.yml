version: "3.8"

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mignonritz-dev-web
    environment:
      FLASK_ENV: development
      FLASK_APP: run.py
      PORT: 5000
    expose:
      - "5000"
    restart: unless-stopped
    networks:
      - proxy

networks:
  proxy:
    external: true
